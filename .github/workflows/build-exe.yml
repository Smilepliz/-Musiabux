# Сборка exe при каждом пуше в main. Exe: Releases (тег exe) и корень репозитория.
name: Build EXE (main)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build EXE
        run: npm run build:exe

      - name: List built files
        run: dir release

      - name: Prepare single EXE for Release (fix Windows path/glob)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No exe in release/"; exit 1 }
          Copy-Item $exe.FullName -Destination "release/Musiabux.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Musiabux-exe
          path: release/

      - name: Update tag 'exe' and create Release
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -f exe
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" exe --force

      - name: Attach EXE to Release (tag exe)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: exe
          name: Musiabux (exe)
          draft: false
          replace_assets: true
          files: release/Musiabux.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy EXE to repo root and push
        continue-on-error: true
        run: |
          if (-not (Test-Path "release/Musiabux.exe")) { Write-Error "release/Musiabux.exe not found"; exit 1 }
          Copy-Item "release/Musiabux.exe" -Destination "Musiabux.exe"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Musiabux.exe
          git commit -m "Add Musiabux.exe [skip ci]" || exit 0
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
        shell: pwsh
