# Сборка exe при создании версионного тега (v1.0.0, v2.0.0 и т.д.)
name: Release (versioned tag)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build EXE
        run: npm run build:exe

      - name: List built files
        run: dir release

      - name: Create Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Musiabux ${{ github.ref_name }}
          draft: false
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
